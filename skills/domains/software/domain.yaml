schema: apa-domain-pack-v1
id: software
version: "0.1"
status: active
description: "Software, SaaS, AI/ML, data-processing, networking, UI, codec, database, security, and computer-implemented invention support."
detection_signals:
  - source code repository
  - API endpoint
  - algorithm
  - data structure
  - trained model
  - non-transitory computer readable medium
constraints:
  writes_only_under: domain/software/
  canonical_artifact_writes: false
  legal_conclusion: false
hooks:
  - id: disclosure.enrich
    outputs: [domain/software/codebase_inventory.json, domain/software/software_disclosure_summary.md]
    blocking: false
  - id: claims.seed
    outputs: [domain/software/software_claim_seeds.json]
    blocking: false
  - id: analysis.domain
    outputs: [domain/software/software_101_review.json]
    blocking: false
  - id: figures.plan
    outputs: [domain/software/software_architecture_figures.json]
    blocking: false
  - id: rigor.domain
    outputs: [domain/software/software_patent_report.json]
    blocking: false
skills:
  - id: apa-codebase-to-patent
    status: active
    command: /apa-codebase-to-patent
    hook: disclosure.enrich
    runner: node packages/apa-domain-software/cli.mjs inventory
    outputs: [domain/software/codebase_inventory.json]
  - id: apa-software-disclosure-extractor
    status: active
    command: /apa-software-disclosure-extractor
    hook: disclosure.enrich
    runner: node packages/apa-domain-software/cli.mjs disclosure
    outputs: [domain/software/software_disclosure_summary.md]
  - id: apa-software-claim-patterns
    status: active
    command: /apa-software-claim-patterns
    hook: claims.seed
    runner: node packages/apa-domain-software/cli.mjs claim-seeds
    outputs: [domain/software/software_claim_seeds.json]
  - id: apa-software-101-review
    status: active
    command: /apa-software-101-review
    hook: analysis.domain
    runner: node packages/apa-domain-software/cli.mjs 101-review
    outputs: [domain/software/software_101_review.json]
  - id: apa-software-architecture-figures
    status: active
    command: /apa-software-architecture-figures
    hook: figures.plan
    runner: node packages/apa-domain-software/cli.mjs figures
    outputs: [domain/software/software_architecture_figures.json]
  - id: apa-software-patent
    status: active
    command: /apa-software-patent
    hook: rigor.domain
    skill_path: skills/software-patent-review
    outputs: [domain/software/software_patent_report.json]
benchmarks:
  - id: synthetic-codebase-domain
    status: active
    source_class: synthetic_codebase
