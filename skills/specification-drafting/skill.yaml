schema: apa-skill-v1
id: apa-spec
kind: core
phase: drafting
command: /apa-spec
version: "0.1"
description: "Draft specification sections from source-backed embodiments and claims."
inputs: [PATENT.md, logic/claims.md, src/embodiments.md, evidence/drawings/]
outputs: [src/embodiments.md, src/specification_report.json]
upstream: [apa-claims]
downstream: [apa-figures, apa-rigor]
gates_after: [source-span-proof, no-new-matter]
human_checkpoints: [spec-support-review]
domain_hooks: [spec.review]
external_sinks: []
safety: { legal_conclusion: false, requires_human_adoption: true, may_file: false }
