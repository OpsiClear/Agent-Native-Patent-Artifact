# Periodic LLM-judge drafting-quality evals (gstack evals-periodic.yml analog) - PAID, NON-BLOCKING.
# Runs apa-eval LIVE against the worked examples on a weekly schedule (and on demand). Needs the
# ANTHROPIC_API_KEY repo secret; skips cleanly when it is absent (e.g. on forks), so it never
# red-lines a PR. This is a quality signal, not a merge gate.
name: periodic-evals

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evals:
    name: apa-eval (live, paid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: LLM-judge evals on the worked examples
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APA_JUDGE_MODEL: claude-opus-4-8
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY not set - skipping paid evals (expected on forks)."
            exit 0
          fi
          # The budget gate exits 1 on a quality/cost regression; surface it without failing the
          # whole scheduled run (it is advisory, reviewed by a human).
          node packages/apa-eval/cli.mjs --matter examples/minimal-patent-artifact --out .eval-runs || true
          node packages/apa-eval/cli.mjs --matter examples/full-lifecycle-artifact --out .eval-runs || true

      - name: Upload eval run records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-runs
          path: .eval-runs/
          if-no-files-found: ignore
